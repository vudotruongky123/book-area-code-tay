services:
  vue:
    image: node:20-alpine
    container_name: book-area-vue
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: book-area-vue-tunnel
    command: tunnel --no-autoupdate --url http://vue:5173
    depends_on:
      - vue
    restart: unless-stopped
